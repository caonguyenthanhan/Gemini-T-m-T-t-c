<!DOCTYPE html>
<html>
<head>
  <title>Gemini Tóm Tắt & Đọc</title>
  <meta charset="UTF-8">
  <style>
    body { width: 380px; font-family: Arial, sans-serif; padding: 10px; font-size: 14px; }
    h1 { font-size: 16px; text-align: center; margin-top: 0; }
    input[type="password"], input[type="text"] { width: 75%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
    button:hover { opacity: 0.9; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    #summarizeBtn { background-color: #4285F4; width: 100%; }
    #controls button { width: 49%; display: inline-block; }
    #playPauseBtn { background-color: #34A853; }
    #stopBtn { background-color: #EA4335; }
    .api-section { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    .api-section label { display: block; margin-bottom: 3px; font-weight: bold; }
    #result-box { margin-top: 10px; padding: 10px; white-space: pre-wrap; word-wrap: break-word; max-height: 200px; overflow-y: auto; background-color: #f9f9f9; border: 1px solid #eee; border-radius: 4px; font-size: 13px; line-height: 1.5; }
    .api-input-container { display: flex; align-items: center; }
    .api-input-container input { margin-right: 5px; }
    .get-key-btn { background-color: #0F9D58; padding: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <!-- Thêm thông tin về hỗ trợ mới vào phần tiêu đề -->
  <h1>Gemini Tóm Tắt & Đọc</h1>
  <p style="text-align: center; margin-top: -5px; font-size: 12px; color: #4285F4;">Hỗ trợ trang web, YouTube và Google Doc</p>
  
  <!-- Phần còn lại giữ nguyên -->
  <div class="api-section">
    <label for="apiKey">Gemini API Key:</label>
    <div class="api-input-container">
      <input type="password" id="apiKey" placeholder="Dán Gemini API Key của bạn vào đây">
      <button id="getKeyBtn" class="get-key-btn" title="Lấy Gemini API Key">🔑 Lấy Key</button>
    </div>
    <button id="saveKeyBtn" style="background-color: #fbbc05; width: 100%;">Lưu Key</button>
    <button id="clearKeysBtn" style="background-color: #EA4335; width: 100%; margin-top:6px;">Xóa Key và dữ liệu</button>
  </div>

  <div style="display: flex; gap: 10px; margin-bottom: 10px;">
    <button id="summarizeBtn" style="flex: 3;">Tóm tắt trang này</button>
    <button id="chatBtn" style="flex: 1; background-color: #0F9D58;">Chat</button>
  </div>
  
  <label for="ttsEngine">Chọn giọng đọc:</label>
  <select id="ttsEngine">
      <option value="browser">Giọng đọc của trình duyệt</option>
      <option value="google">Giọng đọc Google Cloud</option>
      <option value="local">Giọng đọc cục bộ (Local)</option>
  </select>
  

  
  <div id="googleTtsSection" class="api-section" style="display: none;">
      <label>Cài đặt Google Cloud TTS:</label>
      <input type="password" id="googleTtsApiKey" placeholder="Google Cloud API Key">
      <button id="saveGoogleTtsBtn" style="background-color: #fbbc05; width: 100%;">Lưu Google TTS Key</button>
  </div>
  
  <div id="controls">
      <button id="playPauseBtn">▶️ Đọc</button>
      <button id="stopBtn">⏹️ Dừng</button>
  </div>

  <div id="image-section" style="margin-top: 10px;">
    <label for="imageUpload">Chọn ảnh để tóm tắt:</label>
    <input id="imageUpload" type="file" accept="image/*">
    <textarea id="imageContextText" placeholder="Nhập văn bản kèm ảnh (tuỳ chọn)" style="width: 100%; height: 60px; margin-top: 6px; border: 1px solid #ccc; border-radius: 4px; padding: 6px;"></textarea>
    <button id="summarizeImageBtn" style="background-color: #4285F4; width: 100%; margin-top: 6px;">Tóm tắt ảnh</button>
  </div>

  <div id="result-box">Trạng thái: Sẵn sàng.</div>

  <script src="popup.js"></script>
</body>
</html>
